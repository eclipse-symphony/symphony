apiVersion: federation.symphony/v1
kind: CatalogVersion
metadata:
  name: solutionversion-v-version1
spec:
  rootResource: solutionversion
  catalogType: solution
  properties:
    metadata:
      name: solutionversion:version1
    spec: 
      displayName: site-app-v1
      components:
      - name: influxdb
        type: container
        properties:
          container.image: "influxdb:latest"
      - name: grafana
        type: container
        properties:
          container.image: "redis:latest"
      - name: inference
        type: container
        properties:
          container.image: "redis:latest"
          env.AI_MODEL: "$config(ai-config,model)"