apiVersion: federation.symphony/v1
kind: CatalogVersion
metadata:
  name: sitecatalogversion-v-version1
spec:
  rootResource: sitecatalogversion
  catalogType: catalogversion
  properties:
    metadata: 
      name: webappconfig:version1
    spec: 
      catalogType: config
      properties:
        testA:
          testB:
            testC:
              serviceType: "${{$config('webappconfig2:version1','test.dot.serviceType')}}"
              image: "${{$config('webappconfig2:version1','`.testA.testB.images[] | select(.ver > 2) | .image`')}}"
