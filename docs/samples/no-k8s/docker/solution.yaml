apiVersion: solution.symphony/v1
kind: Solution
metadata: 
  name: sample-prometheus-server-v-v1
spec:
  rootResource: sample-prometheus-server
  metadata:
    deployment.replicas: "#1"
    service.ports: "[{\"name\":\"port9090\",\"port\": 9090}]"
    service.type: "LoadBalancer"
  components:
  - name: sample-prometheus-server
    type: container
    properties:
      container.image: "prom/prometheus"
      container.ports: "{\"9090/tcp\":{\"HostIP\":\"0.0.0.0\",\"hostPort\":\"9090\"}}"